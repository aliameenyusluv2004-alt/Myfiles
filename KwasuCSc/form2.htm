<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Form</title>
</head>
<body>
    <h1>Fruit Surveey</h1>
    <form action="form.htm" method="dialog">
        <label for="name "> Name:</label><br>
        <input type="text" id="name" name="name"><br>
        <label for="address">Address:</label><br>
        <input type="text" id="address" name="address"><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>
        <p>HOW MANY PIECES OF FRUIT DO YOU EAT PER DAY?</p>
        <input type="radio" id="one" name="fruit" value="1-2">
        <label for="one">1-2</label><br>
        <input type="radio" id="two" name="fruit" value="3-4">
        <label for="two">3-4</label><br>
        <input type="radio" id="three" name="fruit" value="5-6">
        <label for="three">more than 5</label><br>
        <p><h3>My Favourite fruit:</h3></p>
        <select name="dropdown" multiple>
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="orange">Orange</option>
            <option value="grape">Grape</option>
            <option value="mango">Mango</option>
            
    </form>
</body>
</html>
